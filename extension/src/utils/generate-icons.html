<!doctype html>
<!--
  用這個 HTML 頁面在瀏覽器中產生圖示 PNG。
  開啟後按下 "下載圖示" 按鈕，會分別下載 16x16, 48x48, 128x128 的圖示。
  把下載的 PNG 放到 extension/public/icons/ 目錄。
-->
<html>
  <head>
    <meta charset="UTF-8" />
    <title>NewsLens 圖示產生器</title>
  </head>
  <body>
    <h2>NewsLens 圖示產生器</h2>
    <div id="canvases"></div>
    <button onclick="downloadAll()">下載所有圖示</button>
    <script>
      const sizes = [16, 48, 128];

      function drawIcon(size) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const r = size * 0.15;

        // 背景圓角矩形
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(size - r, 0);
        ctx.quadraticCurveTo(size, 0, size, r);
        ctx.lineTo(size, size - r);
        ctx.quadraticCurveTo(size, size, size - r, size);
        ctx.lineTo(r, size);
        ctx.quadraticCurveTo(0, size, 0, size - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();
        ctx.fillStyle = '#2563eb';
        ctx.fill();

        // 文字 N
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${size * 0.55}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('N', size / 2, size / 2 + size * 0.03);

        return canvas;
      }

      const container = document.getElementById('canvases');
      sizes.forEach((size) => {
        const canvas = drawIcon(size);
        const label = document.createElement('p');
        label.textContent = `${size}x${size}`;
        container.appendChild(label);
        container.appendChild(canvas);
      });

      function downloadAll() {
        sizes.forEach((size) => {
          const canvas = drawIcon(size);
          const link = document.createElement('a');
          link.download = `icon${size}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
        });
      }
    </script>
  </body>
</html>
